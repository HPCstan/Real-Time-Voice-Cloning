<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Voice Cloning - AI 語音克隆</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: #f8fafc;
            min-height: 100vh;
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .gradient-text {
            background: linear-gradient(90deg, #60a5fa, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .btn-gradient {
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            transition: all 0.3s ease;
        }
        .btn-gradient:hover {
            opacity: 0.9;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
        }
        .dropzone {
            border: 2px dashed rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }
        .dropzone:hover {
            border-color: #60a5fa;
            background: rgba(96, 165, 250, 0.05);
        }
        .loader {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #60a5fa;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [file, setFile] = useState(null);
            const [text, setText] = useState("");
            const [isGenerating, setIsGenerating] = useState(false);
            const [resultAudio, setResultAudio] = useState(null);
            const [error, setError] = useState(null);
            const [status, setStatus] = useState("");

            const handleFileChange = (e) => {
                const selectedFile = e.target.files[0];
                if (selectedFile) {
                    setFile(selectedFile);
                    setError(null);
                }
            };

            const handleClone = async () => {
                if (!file || !text) {
                    setError("請確保已選擇音訊檔案並輸入文字。");
                    return;
                }

                setIsGenerating(true);
                setError(null);
                setResultAudio(null);
                setStatus("正在上傳並提取聲音特徵...");

                try {
                    const formData = new FormData();
                    formData.append("file", file);
                    formData.append("text", text);

                    const response = await fetch("http://localhost:8000/clone", {
                        method: "POST",
                        body: formData,
                    });

                    if (!response.ok) {
                        const errorData = await response.json();
                        throw new Error(errorData.detail || "伺服器發生錯誤");
                    }

                    setStatus("語音合成中...");
                    const blob = await response.blob();
                    const url = URL.createObjectURL(blob);
                    setResultAudio(url);
                    setStatus("生成成功！");
                } catch (err) {
                    console.error(err);
                    setError(err.message);
                    setStatus("");
                } finally {
                    setIsGenerating(false);
                }
            };

            return (
                <div className="container mx-auto px-4 py-12 max-w-3xl">
                    <header className="text-center mb-12 animate__animated animate__fadeIn">
                        <h1 className="text-5xl font-extrabold mb-4">
                            <span className="gradient-text">Real-Time Voice Cloning</span>
                        </h1>
                        <p className="text-slate-400 text-lg">幾秒鐘內克隆任何人的聲音，生成自然流暢的語音。</p>
                    </header>

                    <div className="glass rounded-3xl p-8 shadow-2xl animate__animated animate__fadeInUp">
                        {/* Step 1: Upload */}
                        <div className="mb-8">
                            <label className="block text-sm font-semibold mb-4 text-slate-300">
                                步驟 1: 上傳參考語音 (5-15 秒效果最佳)
                            </label>
                            <div 
                                className={`dropzone rounded-2xl p-8 text-center cursor-pointer ${file ? 'border-blue-400 bg-blue-500/10' : ''}`}
                                onClick={() => document.getElementById('fileInput').click()}
                            >
                                <input 
                                    type="file" 
                                    id="fileInput" 
                                    className="hidden" 
                                    accept="audio/*" 
                                    onChange={handleFileChange} 
                                />
                                <div className="flex flex-col items-center">
                                    <svg xmlns="http://www.w3.org/2000/svg" className="h-12 w-12 text-blue-400 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
                                    </svg>
                                    <span className="text-slate-300 font-medium pb-2">
                                        {file ? file.name : "點擊或拖放音訊檔案至此"}
                                    </span>
                                    {file && <span className="text-xs text-blue-400">已成功加載</span>}
                                </div>
                            </div>
                        </div>

                        {/* Step 2: Text Input */}
                        <div className="mb-8">
                            <label className="block text-sm font-semibold mb-4 text-slate-300">
                                步驟 2: 輸入您想讓伊說的話
                            </label>
                            <textarea 
                                className="w-full bg-slate-900/50 border border-slate-700 rounded-2xl p-4 text-white focus:ring-2 focus:ring-blue-500 outline-none transition-all resize-none"
                                rows="3"
                                placeholder="例如：哈囉，這是一次語音克隆的測試，感覺如何呢？"
                                value={text}
                                onChange={(e) => setText(e.target.value)}
                            ></textarea>
                        </div>

                        {/* Action: Generate */}
                        <div className="flex flex-col items-center gap-4">
                            <button 
                                className={`w-full py-4 rounded-full text-white font-bold text-lg btn-gradient disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-3`}
                                onClick={handleClone}
                                disabled={isGenerating || !file || !text}
                            >
                                {isGenerating ? (
                                    <>
                                        <div className="loader"></div>
                                        <span>語音生成中 (可能需要 30-60 秒)...</span>
                                    </>
                                ) : (
                                    <span>開始克隆語音</span>
                                )}
                            </button>

                            {status && <p className="text-blue-400 text-sm animate__animated animate__pulse animate__infinite">{status}</p>}
                            {error && <p className="text-red-400 text-sm italic">錯誤: {error}</p>}
                        </div>

                        {/* Result: Audio Player */}
                        {resultAudio && (
                            <div className="mt-10 p-6 bg-blue-500/10 rounded-2xl border border-blue-500/30 animate__animated animate__fadeIn">
                                <label className="block text-sm font-semibold mb-4 text-blue-400 text-center">
                                    克隆語音結果
                                </label>
                                <audio controls src={resultAudio} className="w-full"></audio>
                                <div className="flex justify-center mt-4">
                                    <a 
                                        href={resultAudio} 
                                        download="cloned_voice.wav"
                                        className="text-xs text-slate-400 hover:text-white transition-colors"
                                    >
                                        下載音訊檔案
                                    </a>
                                </div>
                            </div>
                        )}
                    </div>

                    <footer className="mt-12 text-center text-slate-500 text-xs">
                        <p>© 2026 Real-Time Voice Cloning API - 改編自 HPCstan/Real-Time-Voice-Cloning</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
